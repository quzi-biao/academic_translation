upstream academic_translation_web {
    server 127.0.0.1:7001;
    keepalive 32;
}

upstream academic_translation_admin {
    server 127.0.0.1:7002;
    keepalive 32;
}

# 闻一翻译 ToC Web（HTTPS 7001）
server {
    listen 7001 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/flipbook.crt;
    ssl_certificate_key /etc/nginx/ssl/flipbook.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 120m;
    access_log /var/log/nginx/academic_translation_web_access.log;
    error_log  /var/log/nginx/academic_translation_web_error.log warn;

    location / {
        proxy_pass http://academic_translation_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
    }
}

# 闻一翻译 Admin（HTTPS 7002）
server {
    listen 7002 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/flipbook.crt;
    ssl_certificate_key /etc/nginx/ssl/flipbook.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 120m;
    access_log /var/log/nginx/academic_translation_admin_access.log;
    error_log  /var/log/nginx/academic_translation_admin_error.log warn;

    location / {
        proxy_pass http://academic_translation_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
